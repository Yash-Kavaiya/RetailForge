# Builds and pushes the three RetailForge images to Artifact Registry.
#   gcloud builds submit --config deployment/cloudbuild.yaml \
#     --substitutions=_IMAGE_PREFIX=us-central1-docker.pkg.dev/PROJECT/retailforge
substitutions:
  _IMAGE_PREFIX: "us-central1-docker.pkg.dev/PROJECT_ID/retailforge"

steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "deployment/Dockerfile.toolbox", "-t", "${_IMAGE_PREFIX}/toolbox:latest", "."]
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "deployment/Dockerfile.backend", "-t", "${_IMAGE_PREFIX}/backend:latest", "."]
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "deployment/Dockerfile.frontend", "-t", "${_IMAGE_PREFIX}/frontend:latest", "."]

images:
  - "${_IMAGE_PREFIX}/toolbox:latest"
  - "${_IMAGE_PREFIX}/backend:latest"
  - "${_IMAGE_PREFIX}/frontend:latest"

options:
  machineType: E2_HIGHCPU_8
